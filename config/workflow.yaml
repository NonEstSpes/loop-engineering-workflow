# Top-level workflow wiring
task_source: redmine
max_rework_iterations: 3
human_in_the_loop: true
default_branch: main
pr_target_branch: main
corporate_report_channels:
  - console
  # Available channels (Phase 2+):
  # - ntfy    # push notifications via ntfy.sh (needs NTFY_TOPIC env)
  # - email   # SMTP email (needs SMTP_HOST, EMAIL_FROM, EMAIL_TO env)
# Path to TODO.md — the orchestrator reads task entries from here (selecting by
# #r0..#r5 priority) and the reporter writes the result back into the same line.
# Override per-run with --todo-path or the DEVFLOW_TODO_PATH env variable.
todo_path: TODO.md

# HITL strategy: per_plan | full_detail | end_of_day
hitl_strategy: per_plan

# Daemon configuration (for autonomous scheduled runs)
daemon:
  enabled: false
  # Cron schedules (standard 5-field cron: minute hour day month day-of-week)
  task_schedule: "0 9,15 * * 1-5"   # weekdays 09:00 and 15:00
  eod_schedule: "0 18 * * 1-5"      # weekdays 18:00 (only in end_of_day mode)
  port: 8787                         # dashboard API port (localhost only)
  approval_timeout_hours: 8          # max time to wait for human approval
  approval_on_timeout: defer         # defer | reject

# Forge backend configuration (push branches + create merge requests)
forge:
  provider: none    # none | github | gitlab | auto (auto = detect from git remote)
  target_branch: main
  actions:
    - publish_report
    - update_tracker
    - record_todo
    # In end_of_day mode, per-task runs execute the default actions above
    # (publish_report, update_tracker, record_todo) during the day — NOT push
    # and create_mr, which only happen at the EOD batch-publish stage. The
    # BatchPublisher at EOD then pushes branches and opens MRs for all
    # approved tasks at once. To make per-task EOD runs truly local (no
    # publish_report/update_tracker during the day), the reporter's
    # prepare_only mode must be wired through the graph (future work).
    # For per_plan/full_detail, uncomment to push/open MRs per task:
    # - push
    # - create_mr
